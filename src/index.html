<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaterVapour</title>
    <style>
        :root {
            --bg: #111111;
            --surface: #1a1a1a;
            --surface2: #222222;
            --border: #2e2e2e;
            --text: #ffffff;
            --subtext: #888888;
            --blue: #3a8ef6;
            --blue-hover: #5aa3ff;
            --blue-dim: #1a3a6e;
            --red: #ff4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            user-select: none;
        }

        #titlebar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        #titlebar .left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #titlebar img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        #titlebar h1 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        #titlebar .controls {
            display: flex;
            gap: 14px;
            -webkit-app-region: no-drag;
        }

        #titlebar .controls span {
            cursor: pointer;
            color: var(--text);
            font-size: 16px;
            line-height: 1;
            transition: color 0.15s;
        }

        #titlebar .controls span:hover { color: #dddddd; }
        #titlebar .controls .close:hover { color: var(--red); }

        #content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 14px;
            gap: 12px;
            overflow: hidden;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 6px;
        }

        .folder-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .folder-path {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 12px;
            color: var(--subtext);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            background: var(--blue);
            color: var(--text);
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn:hover { background: var(--blue-hover); }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { background: var(--border); }

        .search-row {
            display: flex;
            gap: 8px;
        }

        #search {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
        }

        #search::placeholder { color: var(--subtext); }
        #search:focus { border-color: var(--blue); }

        #status {
            font-size: 12px;
            color: var(--subtext);
        }

        #status.error { color: #ff6b6b; }

        #game-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #game-list::-webkit-scrollbar { width: 5px; }
        #game-list::-webkit-scrollbar-track { background: transparent; }
        #game-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .game-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            transition: border-color 0.15s;
        }

        .game-card:hover { border-color: var(--blue-dim); }

        .game-thumb {
            width: 46px;
            height: 34px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--surface2);
            flex-shrink: 0;
        }

        .game-info {
            flex: 1;
            min-width: 0;
        }

        .game-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-id {
            font-size: 11px;
            color: var(--subtext);
            margin-top: 2px;
        }

        .btn-play {
            background: var(--blue);
            color: var(--text);
            border: none;
            border-radius: 5px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-play:hover { background: var(--blue-hover); }

        .empty-state {
            text-align: center;
            color: var(--subtext);
            margin-top: 40px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="titlebar">
        <div class="left">
            <img src="../Assets/WaterVapourLogo.png" alt="" />
            <h1>WaterVapour</h1>
        </div>
        <div class="controls">
            <span onclick="window.electron.minimize()">—</span>
            <span class="close" onclick="window.electron.close()">✕</span>
        </div>
    </div>

    <div id="content">
        <div>
            <div class="section-label">Steam Library Folder</div>
            <div class="folder-row">
                <div class="folder-path" id="folder-display">No folder selected</div>
                <button class="btn" onclick="pickFolder()">Browse…</button>
            </div>
        </div>

        <div class="search-row">
            <input id="search" type="text" placeholder="Search games…" oninput="filterGames()" />
            <button class="btn btn-ghost" onclick="refresh()">↺ Refresh</button>
        </div>

        <div id="status"></div>
        <div id="game-list"></div>
    </div>

    <script>
        let currentFolder = localStorage.getItem('steamappsFolder') || '';
        let allGames = [];

        if (currentFolder) {
            document.getElementById('folder-display').textContent = currentFolder;
            scanGames();
        } else {
            renderGames([]);
        }

        async function pickFolder() {
            const folder = await window.electron.pickFolder();
            if (!folder) return;
            currentFolder = folder;
            localStorage.setItem('steamappsFolder', folder);
            document.getElementById('folder-display').textContent = folder;
            scanGames();
        }

        async function scanGames() {
            if (!currentFolder) {
                setStatus('No folder selected.', true);
                renderGames([]);
                return;
            }

            setStatus('Scanning…');
            const result = await window.electron.scanGames(currentFolder);

            if (result?.error) {
                setStatus(result.error, true);
                allGames = [];
                renderGames([]);
                return;
            }

            allGames = (result.games || []).sort((a, b) => a.name.localeCompare(b.name));
            setStatus(allGames.length + ' game' + (allGames.length !== 1 ? 's' : '') + ' installed');
            renderGames(allGames);
        }

        function refresh() {
            scanGames();
        }

        function filterGames() {
            const q = document.getElementById('search').value.toLowerCase();
            renderGames(allGames.filter(g => g.name.toLowerCase().includes(q)));
        }

        function renderGames(games) {
            const list = document.getElementById('game-list');
            list.innerHTML = '';

            if (!games || games.length === 0) {
                list.innerHTML = '<div class="empty-state">No games found</div>';
                return;
            }

            for (const game of games) {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <img class="game-thumb"
                         src="https://cdn.cloudflare.steamstatic.com/steam/apps/${game.id}/capsule_sm_120.jpg"
                         onerror="this.style.opacity='0'"
                         alt="">
                    <div class="game-info">
                        <div class="game-name">${escapeHtml(game.name)}</div>
                        <div class="game-id">App ID: ${escapeHtml(game.id)}</div>
                    </div>
                    <div class="game-actions">
                        <button class="btn-play" onclick="window.electron.playGame('${String(game.id).replace(/'/g, '')}')">▶ Play</button>
                    </div>
                `;
                list.appendChild(card);
            }
        }

        function setStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = isError ? 'error' : '';
        }

        function escapeHtml(s) {
            return String(s)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }
    </script>
</body>
</html>
